[training]
batch_size = 1
update_per_step = 8
max_epoch = 200

[optimizer]
eps = 1e-5
backbone_init_lr = 1e-4
backbone_weight_decay = 1e-3
classifier_init_lr = 1e-3
classifier_weight_decay = 1e-3

[model_params]
drop_p = 0.5

[data]
num_frames = 32 
frame_size = 224

[early_stopping]
metric = ('val', 'loss')
mode = 'min'
patience = 15
min_delta = 0.01

; same as configfiles/asl100/MViTv2_S_011.ini but with
; num_frames = 32 and batch size equivalent to 8 (batch_size = 1, update_per_step = 8)

; and patience reduced to 15 from 50

