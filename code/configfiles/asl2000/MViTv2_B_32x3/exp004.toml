[training]
batch_size = 1
update_per_step = 8
max_epoch = 200

[optimizer]
eps = 1e-5
backbone_init_lr = 1e-4
backbone_weight_decay = 1e-3
classifier_init_lr = 1e-3
classifier_weight_decay = 1e-3

[model_params]
drop_p = 0.5


#Train augs

[data.train_augs]
normalise = true

#Temporal augs
#Sampler
[[data.train_augs.temporal_aug]]
type = 'og'
max_wobble = 0
target_length = 32

#Spatial augs
#Crop
[[data.train_augs.spatial_aug]]
type = 'Random_crop'
frame_size = 224

[[data.train_augs.spatial_aug]]
type = "HORIZONTAL_FLIP"
p = 0.5

#Test augs

[data.test_augs]
normalise = true

#Temporal augs
#Sampler
[[data.test_augs.temporal_aug]]
type = 'og'
max_wobble = 0
target_length = 32

#Spatial augs
#Crop
[[data.test_augs.spatial_aug]]
type = "Centre_crop"
frame_size = 224


[scheduler]
type = "CosineAnnealingWarmRestarts"
t0 = 10
tmult = 1
eta_min = 0.0

[early_stopping]
metric = ['val', 'loss']
mode = 'min'
patience = 15
min_delta = 0.01

