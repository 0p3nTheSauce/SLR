[training]
batch_size = 8
update_per_step = 1
max_epoch = 200

[optimizer]
eps = 1e-5
backbone_init_lr = 1e-4
backbone_weight_decay = 1e-3
classifier_init_lr = 1e-3
classifier_weight_decay = 1e-3

[model_params]
drop_p = 0.5

[data.train_augs]
normalise = true

[[data.train_augs.temporal_aug]]
type = "og"
target_length = 32

[[data.train_augs.spatial_aug]]
type = "Random_crop"
size = 224

[[data.train_augs.spatial_aug]]
type = "HORIZONTAL_FLIP"
p = 0.5

[data.test_augs]
normalise = true

[[data.test_augs.temporal_aug]]
type = "og"
target_length = 32

[[data.test_augs.spatial_aug]]
type = "Centre_crop"
size = 224

[scheduler]
type = "CosineAnnealingWarmRestarts"
t0 = 10
tmult = 1
eta_min = 0.0

[early_stopping]
metric = ['val', 'loss']
mode = 'min'
patience = 15
min_delta = 0.01

