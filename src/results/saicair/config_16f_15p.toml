[training]
# batch_size = 1
# update_per_step = 8
batch_size_equivalent = 8
# max_epoch = 200

[optimizer]
eps = 1e-5
backbone_init_lr = 1e-4
backbone_weight_decay = 1e-3
classifier_init_lr = 1e-3
classifier_weight_decay = 1e-3

[model_params]
drop_p = 0.5


[data]
num_frames = 16
frame_size = 224

[data.train_augs]
frame_size_strategy = 'Random_crop'
normalise = true

[data.train_augs.frame_sampler]
method = 'og'
# wobble = 0

[[data.train_augs.spatial_aug]]
type = "HORIZONTAL_FLIP"
p = 0.5

[data.test_augs]
frame_size_strategy = 'Centre_crop'
normalise = true

[data.test_augs.frame_sampler]
method = 'og'
# wobble = 0


[early_stopping]
metric = ['val', 'loss']
mode = 'min'
min_delta = 0.01
patience = 15
