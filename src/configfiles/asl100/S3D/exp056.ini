[training]
batch_size = 8
update_per_step = 1
max_epoch = 200

[optimizer]
eps = 1e-5
backbone_init_lr = 1e-4
backbone_weight_decay = 1e-3
classifier_init_lr = 1e-3
classifier_weight_decay = 1e-3

[model_params]
drop_p = 0.5

[data]
num_frames = 32
frame_size = 224

[early_stopping]
metric = ('val', 'loss')
mode = 'min'
patience = 15
min_delta = 0.01

;Same as configfiles/generic2/hframe_hwd_warmrestarts_hbs/t0_30.ini (48)
; except with no scheduler
; and patience of 15 for early stopping
