[training]
batch_size = 1
update_per_step = 8
max_epoch = 200

[optimizer]
eps = 1e-5
backbone_init_lr = 1e-4
backbone_weight_decay = 1e-3
classifier_init_lr = 1e-3
classifier_weight_decay = 1e-3

[model_params]
drop_p = 0.5

[scheduler] 
type = 'CosineAnnealingWarmRestarts'
t0 = 20
tmult = 1
eta_min = 0

[data]
num_frames = 32
frame_size = 224

[early_stopping]
metric = ('val', 'loss')
mode = 'min'
patience = 15
min_delta = 0.01

;Same as ./configfiles/generic2/hframe_hwd_warmrestarts_hbs/t0_20.ini
; but with adjusted batch size and reduced patience to 15 from 50